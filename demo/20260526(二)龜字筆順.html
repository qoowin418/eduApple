<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字筆順大冒險</title>
    <style>
        :root {
            --primary: #4e9a06;
            --secondary: #73d216;
            --accent: #f57900;
            --bg-color: #f3f8f2;
            --grid-color: #edd400;
            --left-panel-width: 280px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #2e3436;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ================= 左側：操作與控制面板 ================= */
        .left-panel {
            width: var(--left-panel-width);
            background-color: #ffffff;
            border-right: 4px solid #c0a080;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            height: 100%;
            box-shadow: 3px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            color: var(--primary);
            font-size: 24px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 12px;
            color: #555753;
            text-align: center;
            margin: 5px 0 15px 0;
        }

        /* 左側：選字區域（縮小高度、直向排列） */
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #c0a080;
            margin-bottom: 8px;
            border-left: 4px solid #c0a080;
            padding-left: 6px;
        }

        .word-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 20px;
        }

        .word-btn {
            background-color: #ffffff;
            border: 2px solid #c0a080;
            color: #2e3436;
            padding: 8px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .word-btn.active {
            background-color: #c0a080;
            color: white;
            transform: scale(1.05);
        }

        /* 左側：狀態與提示區域 */
        .status-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-bar {
            font-size: 15px;
            font-weight: bold;
            color: var(--primary);
            background-color: #eef4ec;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #d3d7cf;
        }

        .info-panel {
            background-color: #f9faf9;
            border-left: 5px solid var(--primary);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #2e3436;
            line-height: 1.5;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        /* 左側：控制按鈕群 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
            padding-top: 15px;
            border-top: 2px dashed #e8e8e8;
        }

        .control-row {
            display: flex;
            gap: 8px;
        }

        .control-row button {
            flex: 1;
        }

        button.action-btn {
            background-color: #ffffff;
            border: 2px solid #d3d7cf;
            color: #2e3436;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button.action-btn:hover:not(:disabled) {
            background-color: var(--secondary);
            color: white;
            border-color: var(--primary);
        }

        button.action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button.primary-btn {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ================= 右側：超大練習畫布區 ================= */
        .main-layout {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            height: 100%;
        }

        /* 放大至 600x600 的黃金練習比例 */
        .canvas-container {
            position: relative;
            width: 600px;
            height: 600px;
            background-color: #ffffff;
            border: 10px solid #c0a080;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .mi-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .mi-line {
            position: absolute;
            stroke: var(--grid-color);
            stroke-width: 2.5;
            stroke-dasharray: 6 6;
            opacity: 0.6;
        }

        .mi-border-cross {
            position: absolute;
            stroke: var(--grid-color);
            stroke-width: 3;
            opacity: 0.5;
        }

        #strokeSvg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* 元素與標記 */
        .marker {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transform: translate(-20px, -20px);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .start-marker {
            background-color: #3465a4;
            color: white;
            border: 2px solid #ffffff;
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        .cute-animal {
            width: 56px;
            height: 56px;
            position: absolute;
            transform: translate(-28px, -28px);
            z-index: 11;
            pointer-events: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes pulse {
            0% { transform: translate(-20px, -20px) scale(1); box-shadow: 0 0 0 0 rgba(52, 101, 164, 0.7); }
            70% { transform: translate(-20px, -20px) scale(1.15); box-shadow: 0 0 0 12px rgba(52, 101, 164, 0); }
            100% { transform: translate(-20px, -20px) scale(1); box-shadow: 0 0 0 0 rgba(52, 101, 164, 0); }
        }

        /* 通關慶祝層 */
        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.92);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .success-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-title {
            font-size: 34px;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 20px;
        }

        .party-animal {
            font-size: 60px;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-25px); }
        }
    </style>
</head>

        let activeWordKey = "word1"; 
        let currentStep = 0;
        
        const svg = document.getElementById('strokeSvg');
        const bgStrokesG = document.getElementById('bgStrokes');
        const doneStrokesG = document.getElementById('doneStrokes');
        const guideTrack = document.getElementById('guideTrack');
        const userTrack = document.getElementById('userTrack');
        const interactiveElements = document.getElementById('interactiveElements');
        const statusBar = document.getElementById('statusBar');
        const strokeInstruction = document.getElementById('strokeInstruction');
        const successOverlay = document.getElementById('successOverlay');

        let isDrawing = false;

        function getCurrentStrokeData() {
            return allWordsData[activeWordKey] || [];
        }

        function init() {
            const strokeData = getCurrentStrokeData();
            bgStrokesG.innerHTML = '';
            
            if (strokeData.length === 0) {
                statusBar.innerText = "尚未設定資料喔！";
                strokeInstruction.innerText = "請點選其他有資料的字（例如：龜、我、龍）。";
                doneStrokesG.innerHTML = '';
                guideTrack.setAttribute('d', '');
                interactiveElements.innerHTML = '';
                updateButtons();
                return;
            }

            strokeData.forEach(stroke => {
                bgStrokesG.appendChild(createSvgPath(stroke.points));
            });
            renderCurrentStep();
        }

        function switchWord(wordKey) {
            activeWordKey = wordKey;
            currentStep = 0; 

            const buttons = document.querySelectorAll('.word-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            event.target.classList.add('active');
            successOverlay.classList.remove('show');
            init();
        }

        function getPathD(points) {
            if (points.length === 0) return '';
            let d = `M ${points[0][0]} ${points[0][1]}`;
            for (let i = 1; i < points.length; i++) {
                d += ` L ${points[i][0]} ${points[i][1]}`;
            }
            return d;
        }

        function createSvgPath(points) {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', getPathD(points));
            return path;
        }

        function renderCurrentStep() {
            const strokeData = getCurrentStrokeData();
            const totalStrokes = strokeData.length;

            interactiveElements.innerHTML = '';
            userTrack.setAttribute('d', '');
            
            if (totalStrokes === 0) return;

            if (currentStep >= totalStrokes) {
                statusBar.innerText = "太完美了！通關！";
                successOverlay.classList.add('show');
                return;
            }

            successOverlay.classList.remove('show');
            const stroke = strokeData[currentStep];
            
            statusBar.innerText = `第 ${stroke.id} / ${totalStrokes} 筆：${stroke.name}`;
            strokeInstruction.innerText = stroke.info;

            doneStrokesG.innerHTML = '';
            for (let i = 0; i < currentStep; i++) {
                doneStrokesG.appendChild(createSvgPath(strokeData[i].points));
            }

            guideTrack.setAttribute('d', getPathD(stroke.points));

            const startPt = stroke.points[0];
            const endPt = stroke.points[stroke.points.length - 1];

            const startDiv = document.createElement('div');
            startDiv.className = 'marker start-marker';
            startDiv.style.left = `${startPt[0]}px`;
            startDiv.style.top = `${startPt[1]}px`;
            startDiv.innerText = stroke.id;
            interactiveElements.appendChild(startDiv);

            const animalDiv = document.createElement('div');
            animalDiv.className = 'cute-animal';
            animalDiv.style.left = `${endPt[0]}px`;
            animalDiv.style.top = `${endPt[1]}px`;
            animalDiv.style.fontSize = '40px';
            animalDiv.innerText = stroke.animal;
            interactiveElements.appendChild(animalDiv);

            setupTracking(startPt, endPt);
            updateButtons();
        }

        function setupTracking(startPt, endPt) {
            const container = document.getElementById('canvasContainer');
            
            container.onmousedown = null;
            window.onmousemove = null;
            window.onmouseup = null;
            container.ontouchstart = null;
            container.ontouchmove = null;
            container.ontouchend = null;

            let userPoints = [];
            let startTriggered = false;

            function onStart(x, y) {
                const rect = container.getBoundingClientRect();
                const clickX = x - rect.left;
                const clickY = y - rect.top;

                // 配合 600 大畫布，放大起點判定半徑至 55 像素，防呆更好
                const distToStart = Math.hypot(clickX - startPt[0], clickY - startPt[1]);
                if (distToStart < 55) {
                    isDrawing = true;
                    startTriggered = true;
                    userPoints = [[clickX, clickY]];
                    userTrack.setAttribute('d', getPathD(userPoints));
                    statusBar.innerText = "連線中！滑向小動物吧！";
                }
            }

            function onMove(x, y) {
                if (!isDrawing || !startTriggered) return;
                const rect = container.getBoundingClientRect();
                const curX = x - rect.left;
                const curY = y - rect.top;

                userPoints.push([curX, curY]);
                userTrack.setAttribute('d', getPathD(userPoints));

                // 終點判定半徑放大至 45 像素
                const distToEnd = Math.hypot(curX - endPt[0], curY - endPt[1]);
                if (distToEnd < 45) {
                    validateAndPass();
                }
            }

            function onEnd() {
                if (!isDrawing) return;
                isDrawing = false;
                if (startTriggered) {
                    userTrack.setAttribute('d', '');
                    statusBar.innerText = "歪掉囉！重新起點出發吧！";
                }
                startTriggered = false;
            }

            container.onmousedown = e => onStart(e.clientX, e.clientY);
            window.onmousemove = e => { if(isDrawing) onMove(e.clientX, e.clientY); };
            window.onmouseup = onEnd;

            container.ontouchstart = e => {
                const t = e.touches[0];
                onStart(t.clientX, t.clientY);
                e.preventDefault();
            };
            container.ontouchmove = e => {
                if(!isDrawing) return;
                const t = e.touches[0];
                onMove(t.clientX, t.clientY);
                e.preventDefault();
            };
            container.ontouchend = onEnd;
        }

        function validateAndPass() {
            isDrawing = false;
            const animal = document.querySelector('.cute-animal');
            if (animal) {
                animal.style.transform = 'translate(-28px, -28px) scale(1.8)';
            }

            statusBar.innerText = "太棒了！寫對了！👏";
            
            setTimeout(() => {
                currentStep++;
                renderCurrentStep();
            }, 300);
        }

        function playCurrentDemo() {
            const strokeData = getCurrentStrokeData();
            if (currentStep >= strokeData.length || strokeData.length === 0) return;
            const stroke = strokeData[currentStep];
            guideTrack.style.transition = 'none';
            
            const pathLength = guideTrack.getTotalLength();
            guideTrack.style.strokeDasharray = pathLength;
            guideTrack.style.strokeDashoffset = pathLength;
            
            guideTrack.getBoundingClientRect();
            
            guideTrack.style.transition = 'stroke-dashoffset 0.8s ease-in-out';
            guideTrack.style.strokeDashoffset = '0';
            guideTrack.setAttribute('stroke', '#ef2929');
            guideTrack.style.opacity = '0.8';

            const animal = document.querySelector('.cute-animal');
            const startPt = stroke.points[0];
            const endPt = stroke.points[stroke.points.length - 1];
            
            if (animal) {
                animal.style.left = `${startPt[0]}px`;
                animal.style.top = `${startPt[1]}px`;
                setTimeout(() => {
                    animal.style.left = `${endPt[0]}px`;
                    animal.style.top = `${endPt[1]}px`;
                }, 50);
            }

            setTimeout(() => {
                guideTrack.style.transition = 'none';
                guideTrack.style.strokeDasharray = '6 8';
                guideTrack.setAttribute('stroke', '#729fcf');
                guideTrack.style.opacity = '0.4';
                renderCurrentStep();
            }, 900);
        }

        function updateButtons() {
            const strokeData = getCurrentStrokeData();
            const totalStrokes = strokeData.length;
            
            document.getElementById('prevBtn').disabled = (currentStep === 0 || totalStrokes === 0);
            document.getElementById('nextBtn').disabled = (currentStep >= totalStrokes || totalStrokes === 0);
            document.getElementById('demoBtn').disabled = (totalStrokes === 0);
        }

        function stepPrevious() {
            if (currentStep > 0) {
                currentStep--;
                renderCurrentStep();
            }
        }

        function stepNext() {
            const strokeData = getCurrentStrokeData();
            if (currentStep < strokeData.length) {
                currentStep++;
                renderCurrentStep();
            }
        }

        function resetAdventure() {
            currentStep = 0;
            renderCurrentStep();
        }

        window.onload = init;
    </script>
