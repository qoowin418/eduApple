<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水分子運動模擬器 v0.1</title>
    <style>
        :root { --primary: #3498db; --bg: #2c3e50; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 10; pointer-events: none; color: white; }
        .control-panel { pointer-events: auto; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; backdrop-filter: blur(5px); max-width: 300px; }
        input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:active { transform: scale(0.98); }
        .label-group { display: flex; justify-content: space-between; font-size: 14px; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>

<div id="ui">
    <div class="control-panel">
        <h3>粒子運動實驗室 v0.1</h3>
        <div class="label-group">
            <span>溫度：<span id="tempVal">0</span>°C</span>
            <span id="stateText">固態 (冰)</span>
        </div>
        <input type="range" id="tempSlider" min="-50" max="150" value="0">
        <button id="heatBtn">🔥 快速加熱至沸騰</button>
        <p style="font-size: 12px; opacity: 0.8; margin-top: 10px;">
            🖱️ 滾輪/雙指：縮放<br>
            👆 拖曳：移動視角/撥動粒子
        </p>
    </div>
</div>

<canvas id="sim"></canvas>

<script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    const tempSlider = document.getElementById('tempSlider');
    const tempValDisplay = document.getElementById('tempVal');
    const stateText = document.getElementById('stateText');
    const heatBtn = document.getElementById('heatBtn');

    let width, height;
    let particles = [];
    let camera = { x: 0, y: 0, zoom: 1, isDragging: false, lastX: 0, lastY: 0 };
    let touchDistance = 0;

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.vx = 0; this.vy = 0;
            this.radius = 6;
            this.color = '#87CEEB';
        }

        update(temp) {
            // 熱運動：溫度越高，隨機力越大
            let speed = (temp + 60) * 0.05;
            this.vx += (Math.random() - 0.5) * speed;
            this.vy += (Math.random() - 0.5) * speed;

            // 簡易粒子間吸引力 (分子間作用力)
            particles.forEach(p => {
                if(p === this) return;
                let dx = p.x - this.x;
                let dy = p.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 40 && dist > 1) {
                    let force = (dist - 25) * 0.001;
                    if(temp > 100) force *= 0.1; // 高溫時吸引力減弱
                    this.vx += dx * force;
                    this.vy += dy * force;
                }
            });

            // 阻尼
            this.vx *= 0.95; this.vy *= 0.95;
            this.x += this.vx; this.y += this.vy;

            // 邊界限制
            const bound = 200;
            if(Math.abs(this.x) > bound) this.vx *= -1;
            if(Math.abs(this.y) > bound) this.vy *= -1;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.closePath();
        }
    }

    function init() {
        resize();
        particles = [];
        for(let i=0; i<80; i++) {
            particles.push(new Particle((Math.random()-0.5)*100, (Math.random()-0.5)*100));
        }
        loop();
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }

    function loop() {
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.translate(width/2 + camera.x, height/2 + camera.y);
        ctx.scale(camera.zoom, camera.zoom);

        const temp = parseInt(tempSlider.value);
        tempValDisplay.innerText = temp;
        
        if(temp <= 0) { stateText.innerText = "固態 (冰)"; stateText.style.color = "#87CEEB"; }
        else if(temp < 100) { stateText.innerText = "液態 (水)"; stateText.style.color = "#3498db"; }
        else { stateText.innerText = "氣態 (蒸氣)"; stateText.style.color = "#f1c40f"; }

        particles.forEach(p => {
            p.update(temp);
            p.draw();
        });

        ctx.restore();
        requestAnimationFrame(loop);
    }

    // 事件監聽
    window.addEventListener('resize', resize);
    
    // 滑鼠與觸控邏輯
    canvas.addEventListener('mousedown', e => { camera.isDragging = true; camera.lastX = e.clientX; camera.lastY = e.clientY; });
    window.addEventListener('mouseup', () => camera.isDragging = false);
    window.addEventListener('mousemove', e => {
        if(camera.isDragging) {
            camera.x += e.clientX - camera.lastX;
            camera.y += e.clientY - camera.lastY;
            camera.lastX = e.clientX; camera.lastY = e.clientY;
        }
    });

    canvas.addEventListener('wheel', e => {
        camera.zoom += e.deltaY * -0.001;
        camera.zoom = Math.max(0.5, Math.min(5, camera.zoom));
    });

    // 手機雙指縮放簡易實現
    canvas.addEventListener('touchstart', e => {
        if(e.touches.length === 2) {
            touchDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        } else {
            camera.isDragging = true;
            camera.lastX = e.touches[0].clientX;
            camera.lastY = e.touches[0].clientY;
        }
    });

    canvas.addEventListener('touchmove', e => {
        if(e.touches.length === 2) {
            let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            camera.zoom *= (dist / touchDistance);
            touchDistance = dist;
        } else if(camera.isDragging) {
            camera.x += e.touches[0].clientX - camera.lastX;
            camera.y += e.touches[0].clientY - camera.lastY;
            camera.lastX = e.touches[0].clientX;
            camera.lastY = e.touches[0].clientY;
        }
    });

    heatBtn.addEventListener('click', () => {
        let target = 120;
        let step = () => {
            let curr = parseInt(tempSlider.value);
            if(curr < target) {
                tempSlider.value = curr + 2;
                requestAnimationFrame(step);
            }
        };
        step();
    });

    init();
</script>
</body>
</html>
