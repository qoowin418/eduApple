<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上海互動地圖 v0.3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --panel-bg: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }

        /* 控制面板 */
        .control-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-width: 180px;
        }
        .control-panel h4 { margin: 0 0 10px 0; font-size: 14px; color: #333; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .control-item { margin-bottom: 10px; }
        .control-item label { font-size: 12px; display: block; margin-bottom: 5px; color: #666; }
        select { width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #ccc; }

        /* 定位按鈕 */
        .gps-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gps-btn:active { background: #f0f0f0; }

        /* 版本標籤 */
        .version-tag { position: absolute; bottom: 5px; left: 5px; z-index: 1000; font-size: 10px; color: #999; pointer-events: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
    <h4>地圖設定 (v0.3)</h4>
    <div class="control-item">
        <label>交通線路粗細</label>
        <select id="lineWidthSelect" onchange="updateLineWeight(this.value)">
            <option value="2">細 (2px)</option>
            <option value="4" selected>標準 (4px)</option>
            <option value="6">粗 (6px)</option>
            <option value="10">極粗 (10px)</option>
        </select>
    </div>
    <div style="font-size: 11px; color: #e74c3c;">🔴 鐵路 | 🟢 2號線 | 🟣 10號線</div>
</div>

<button class="gps-btn" onclick="locateUser()">🎯</button>
<div class="version-tag">SH_MAP_V0.3_STABLE</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. 初始化地圖
    const map = L.map('map', {
        center: [31.2304, 121.4737],
        zoom: 12,
        zoomControl: false
    });

    // 2. 底圖載入 (支援緩存)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OSM'
    }).addTo(map);

    // 3. 定義線路容器
    let transportLines = [];

    // 線路數據
    const railData = [
        { name: "京滬高鐵/鐵路", color: "#E30013", coords: [[31.2492, 121.4553], [31.2510, 121.4000], [31.1940, 121.3200]] },
        { name: "地鐵 2 號線", color: "#82C341", coords: [[31.2155, 121.3384], [31.2268, 121.4475], [31.2331, 121.4752], [31.2393, 121.4996], [31.2350, 121.5300]] },
        { name: "地鐵 10 號線", color: "#C7AFD3", coords: [[31.1940, 121.3200], [31.2144, 121.4423], [31.2312, 121.4811], [31.2251, 121.4925], [31.2650, 121.5100]] }
    ];

    // 繪製線路函數
    function drawLines(weight) {
        // 先清除舊線路
        transportLines.forEach(line => map.removeLayer(line));
        transportLines = [];

        railData.forEach(item => {
            const poly = L.polyline(item.coords, {
                color: item.color,
                weight: weight,
                opacity: 0.8,
                lineJoin: 'round'
            }).addTo(map).bindTooltip(item.name);
            transportLines.push(poly);
        });
    }

    // 初始繪製
    drawLines(4);

    // 更新線路粗細
    function updateLineWeight(val) {
        drawLines(parseInt(val));
    }

    // 4. 特色標記
    const spots = [
        { name: "外灘觀景區", pos: [31.2406, 121.4907], icon: "🏛️", desc: "必看浦江夜景" },
        { name: "豫園古色風情", pos: [31.2272, 121.4921], icon: "🏮", desc: "傳統建築與市集" },
        { name: "南京東路步行街", pos: [31.2345, 121.4740], icon: "🛍️", desc: "繁華商業核心" }
    ];

    const foods = [
        { name: "南翔小籠(豫園)", pos: [31.2280, 121.4915], icon: "🥟", desc: "皮薄多汁經典" },
        { name: "大壺春生煎", pos: [31.2365, 121.4857], icon: "🍳", desc: "地道滬式生煎" }
    ];

    function addCustomMarkers(data, typeColor) {
        data.forEach(item => {
            const icon = L.divIcon({
                html: `<div style="font-size:24px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));">${item.icon}</div>`,
                className: 'marker-icon',
                iconSize: [30, 30]
            });
            L.marker(item.pos, {icon: icon}).addTo(map)
                .bindPopup(`<strong>${item.name}</strong><br>${item.desc}`);
        });
    }

    addCustomMarkers(spots);
    addCustomMarkers(foods);

    // 5. GPS 定位邏輯
    let userMarker, userCircle;

    function locateUser() {
        map.locate({setView: true, maxZoom: 15, enableHighAccuracy: true});
    }

    map.on('locationfound', function(e) {
        if (userMarker) map.removeLayer(userMarker);
        if (userCircle) map.removeLayer(userCircle);

        userCircle = L.circle(e.latlng, e.accuracy).addTo(map);
        userMarker = L.marker(e.latlng).addTo(map).bindPopup("您的當前位置").openPopup();
    });

    map.on('locationerror', function() {
        alert("無法讀取 GPS，請確認手機已開啟定位並允許瀏覽器存取。");
    });
</script>

</body>
</html>
